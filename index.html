<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Finder JavaScript Dynamic Project</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <img src="./images/white-house.png" alt="Home Icon">
        <i class="fa-solid fa-utensils fork-knife"></i>
        <h1>MEAL FINDER</h1>
        <span class="menu-btn">&#9776;</span>
    </header>
    <section class="hamburgerMenu" id="hamburgerMenu">
        <span class="close">&times;</span>
        <h2>Categories</h2>
        <ul id="categoryList">
        </ul>
    </section>
    <section class="hero-section">
        <img src="./images/banner.jpg" alt="bannerImage" />
        <section class="hero-content">
            <input type="search" placeholder="Search recipes here ..." id="mealSearch" />
            <button class="search-btn" id="search-btn">
                <i class="fa-brands fa-sistrix"></i>
            </button>
            <h3>What are your favorite cuisines?</h3>
            <p>PERSONALIZE YOUR EXPERIENCE</p>
        </section>
    </section>
    <section class="mealContainer hidden" id="mealContainer"></section>
    <section class="mealDetailsContainer hidden" id="mealDetailsContainer"></section>
    <section class="categoriesContainer" id="categoriesContainer">
        <h4>CATEGORIES</h4>
        <hr>
        <section class="categoriesCards" id="categoriesCards"></section>
    </section>
    <section id="categoryInfo" class="hidden categoryInfo">
        <h2 class="categoryTitle" id="categoryTitle"></h2>
        <p class="categoryDescription" id="categoryDescription"></p>
    </section>
    <h4 id="mealHeading" class="hidden mealHeading">MEALS</h4>
    <hr class="hidden mealHeadingHr" id="mealHeadingHr">
    <section class="mealSection" id="mealSection"></section>
    <script src="./script.js"></script>
</body>
</html>
